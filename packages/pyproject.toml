toml[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.backends.legacy:BuildBackend"

[project]
name = "cadena"
version = "0.1.0"
description = "Utility functions for the pipeline"
readme = "README.md"
requires-python = ">=3.8"
license = { text = "MIT" }

dependencies = [
    "pysam",
    "polars",
    "matplotlib",
    "pybedtools",
    "pyranges",
    "pandas",
    "numpy",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-cov",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["cadena*"]